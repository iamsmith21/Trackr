<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Trackr Clipper</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0B0F0C;
      --card-bg: #141A16;
      --border: rgba(255, 255, 255, 0.08);
      --text: #E6EDE7;
      --text-muted: #86868B;
      --primary: #30D158;
      --primary-hover: #26b349;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      width: 320px;
      box-sizing: border-box;
    }

    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-box {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--primary);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .form-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      transition: all 0.2s ease;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(48, 209, 88, 0.15);
    }

    button {
      width: 100%;
      background: var(--primary);
      color: #000000;
      font-weight: 700;
      font-size: 13px;
      padding: 11px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 10px;
    }
    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }

    .status-msg {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .status-msg.error {
      color: #ff453a;
      display: block;
    }
    .status-msg.success {
      color: var(--primary);
      display: block;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="icon.png" alt="Trackr" style="width: 28px; height: 28px; border-radius: 8px; object-fit: cover;">
    <h1 class="title">Trackr Clipper</h1>
  </div>

  <div id="auth-screen" class="screen active">
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" required placeholder="name@gmail.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" required placeholder="••••••••">
      </div>
      <button type="submit">Sign In</button>
    </form>
  </div>

  <div id="clipper-screen" class="screen">
    <form id="clipper-form">
      <div class="form-group">
        <label>Company</label>
        <input type="text" id="job-company" required placeholder="Google">
      </div>
      <div class="form-group">
        <label>Role</label>
        <input type="text" id="job-role" required placeholder="Software Engineer">
      </div>
      <div class="form-group">
        <label>Job Posting URL</label>
        <input type="text" id="job-url" required placeholder="https://linkedin.com/...">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="job-notes" placeholder="e.g. Scraped via extension">
      </div>
      <button type="submit">Add Job</button>
    </form>
  </div>

  <div id="status" class="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
