<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient: Rich dark-green to emerald/mint -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3B2B" />
      <stop offset="100%" stop-color="#2F5C3B" />
    </linearGradient>
    <!-- Accent Gradient for details -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81C784" />
      <stop offset="100%" stop-color="#4CAF50" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Circle (Sleek Dark Emerald) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Briefcase Silhouette -->
  <!-- Handle -->
  <path d="M192 192v-32c0-17.7 14.3-32 32-32h64c17.7 0 32 14.3 32 32v32" stroke="url(#accentGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Main Body -->
  <rect x="96" y="192" width="320" height="208" rx="24" fill="#FFFFFF" fill-opacity="0.08" stroke="url(#accentGrad)" stroke-width="16" />
  
  <!-- Horizontal Stripe / Divider -->
  <line x1="96" y1="288" x2="416" y2="288" stroke="url(#accentGrad)" stroke-width="12" stroke-dasharray="8 8" opacity="0.6" />

  <!-- Briefcase Lock -->
  <rect x="232" y="272" width="48" height="32" rx="8" fill="url(#accentGrad)" filter="url(#glow)" />
  <circle cx="256" cy="288" r="4" fill="#1B3B2B" />
</svg>